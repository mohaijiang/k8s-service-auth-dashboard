version: "3.8"

services:
  backend:
    image: ghcr.io/mohaijiang/k8s-service-auth-dashboard/backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: k8s-service-auth-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=development
      - NAMESPACE=dashboard-auth-system
      - JWT_EXPIRY=24h
      - INIT_ADMIN_USERNAME=admin
      - INIT_ADMIN_PASSWORD=admin123
    # Mount kubeconfig for local development (comment out in production)
    # Run as root in development to access kubeconfig (production uses ServiceAccount)
    user: "0:0"
    volumes:
      - ~/.kube/config:/tmp/kubeconfig:ro
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /root/.kube && \
        cp /tmp/kubeconfig /root/.kube/config && \
        chmod 600 /root/.kube/config && \
        exec ./server
    # For Kubernetes in-cluster testing, remove user/volumes/command above and uncomment:
    # volumes:
    #   - /var/run/secrets/kubernetes.io/serviceaccount:/var/run/secrets/kubernetes.io/serviceaccount:ro
    restart: unless-stopped
    networks:
      - k8s-auth-dashboard
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/mohaijiang/k8s-service-auth-dashboard/frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: k8s-service-auth-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8080
    restart: unless-stopped
    networks:
      - k8s-auth-dashboard
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  k8s-auth-dashboard:
    driver: bridge
