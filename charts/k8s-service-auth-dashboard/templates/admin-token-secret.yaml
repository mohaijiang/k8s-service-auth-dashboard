{{- if .Values.serviceAccount.adminToken.create }}
# This Secret stores a long-lived K8s token for admin access
# The token is created by Kubernetes and mounted to the backend pod
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.serviceAccount.adminToken.secretName }}
  labels:
    {{- include "k8s-service-auth-dashboard.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/service-account.name: {{ include "k8s-service-auth-dashboard.backend.serviceAccountName" . }}
type: kubernetes.io/service-account-token
{{- end }}
