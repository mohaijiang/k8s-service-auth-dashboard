{{- if .Values.clusterRole.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-service-auth-dashboard.fullname" . }}-{{ .Values.clusterRole.name }}-binding
  labels:
    {{- include "k8s-service-auth-dashboard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-service-auth-dashboard.fullname" . }}-{{ .Values.clusterRole.name }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-service-auth-dashboard.backend.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
