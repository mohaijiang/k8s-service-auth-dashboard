{{- if .Values.backend.adminUser.create }}
{{- if not .Values.backend.adminUser.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-service-auth-dashboard.fullname" . }}-admin-user
  labels:
    {{- include "k8s-service-auth-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.backend.adminUser.username | default "admin" | quote }}
  password: {{ .Values.backend.adminUser.password | default (randAlphaNum 16) | quote }}
{{- end }}
{{- end }}
